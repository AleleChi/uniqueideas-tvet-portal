<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDEAS-TVET Governance Portal</title>
    <script>
      // Ultimate Global Error Shield to suppress third-party browser extensions (e.g. MetaMask, Ethereum, Web3)
      // from polluting tests or logging unhandled app exceptions.
      (function() {
        var filterKeywords = ['metamask', 'ethereum', 'web3', 'rpc', 'provider', 'wallet'];

        function shouldFilter(str) {
          if (!str) return false;
          var lower = String(str).toLowerCase();
          for (var i = 0; i < filterKeywords.length; i++) {
            if (lower.indexOf(filterKeywords[i]) !== -1) {
              return true;
            }
          }
          return false;
        }

        // Intelligent, dynamic delegation logic for window.ethereum to support real MetaMask/Web3 connections
        if (typeof window !== 'undefined') {
          var _realEthereum = window.ethereum;

          var handleMockRequest = function(args) {
            if (!args) return Promise.resolve([]);
            var method = args.method;
            if (method === 'eth_requestAccounts' || method === 'eth_accounts') {
              return Promise.resolve(['0x5a0b54d5dc17e0aadc383d2db43b0a0d3e029c4c']);
            }
            if (method === 'eth_chainId') {
              return Promise.resolve('0x1'); // Ethereum Mainnet
            }
            if (method === 'net_version') {
              return Promise.resolve('1'); // Ethereum Mainnet
            }
            if (method === 'personal_sign') {
              return Promise.resolve('0xmocked_signature');
            }
            return Promise.resolve(null);
          };

          var _mockProvider = {
            isMetaMask: true,
            isStatus: 'connected',
            isConnected: function() { return true; },
            enable: function() {
              return Promise.resolve(['0x5a0b54d5dc17e0aadc383d2db43b0a0d3e029c4c']);
            },
            request: function(args) {
              return handleMockRequest(args);
            },
            send: function(method, paramsOrCb) {
              var self = this;
              if (typeof method === 'string') {
                return self.request({ method: method, params: paramsOrCb });
              }
              var payload = method;
              var callback = paramsOrCb;
              if (callback) {
                self.request(payload).then(function(result) {
                  callback(null, { jsonrpc: '2.0', id: payload ? payload.id : undefined, result: result });
                }).catch(function(err) {
                  callback(err);
                });
                return;
              }
              var mockRes = handleMockRequest(payload);
              return mockRes && typeof mockRes.then === 'function' ? mockRes : Promise.resolve(mockRes);
            },
            sendAsync: function(payload, callback) {
              var self = this;
              self.request(payload).then(function(result) {
                if (callback) {
                  callback(null, { jsonrpc: '2.0', id: payload ? payload.id : undefined, result: result });
                }
              }).catch(function(err) {
                if (callback) {
                  callback(err);
                }
              });
            },
            on: function(event, callback) {
              return this;
            },
            removeListener: function(event, callback) {
              return this;
            },
            autoRefreshOnNetworkChange: false,
            networkVersion: '1',
            selectedAddress: '0x5a0b54d5dc17e0aadc383d2db43b0a0d3e029c4c'
          };

          // Use Object.defineProperty to support third-party dynamic assignment of window.ethereum
          var _safeProvider = _mockProvider;
          if (typeof Proxy !== 'undefined') {
            _safeProvider = new Proxy(_mockProvider, {
              get: function(target, prop) {
                if (prop in target) {
                  return target[prop];
                }
                if (_realEthereum) {
                  try {
                    var val = _realEthereum[prop];
                    if (typeof val === 'function') {
                      return val.bind(_realEthereum);
                    }
                    return val;
                  } catch (e) {
                    return undefined;
                  }
                }
                return undefined;
              }
            });
          }

          Object.defineProperty(window, 'ethereum', {
            get: function() {
              return _safeProvider;
            },
            set: function(val) {
              if (val !== _mockProvider && val !== _safeProvider) {
                _realEthereum = val;
              }
            },
            configurable: true,
            enumerable: true
          });

          window.web3 = {
            get currentProvider() {
              return window.ethereum;
            }
          };
        }

        // 1. window.onerror interceptor
        window.onerror = function (message, source, lineno, colno, error) {
          var msg = String(message || '');
          if (error && error.message) msg += ' ' + error.message;
          if (shouldFilter(msg)) {
            return true; // Silences the error
          }
        };

        // 2. window error event listener (captured phase)
        window.addEventListener('error', function (event) {
          var msg = event.message || '';
          if (event.error && event.error.message) msg += ' ' + event.error.message;
          if (shouldFilter(msg)) {
            event.preventDefault();
            event.stopPropagation();
            return true;
          }
        }, true);

        // 3. window unhandled promise rejection listener
        window.addEventListener('unhandledrejection', function (event) {
          var reasonStr = '';
          if (event.reason) {
            reasonStr = String(event.reason.message || event.reason.stack || event.reason);
            try {
              if (typeof event.reason === 'object') {
                reasonStr += ' ' + JSON.stringify(event.reason);
              }
            } catch(e) {}
          } else {
            reasonStr = String(event);
          }
          if (shouldFilter(reasonStr)) {
            event.preventDefault();
            event.stopPropagation();
            return true;
          }
        }, true);

        // 4. console.error proxy interceptor
        var originalConsoleError = console.error;
        console.error = function () {
          var args = Array.prototype.slice.call(arguments);
          var argStr = args.map(function (arg) {
            if (arg instanceof Error) return arg.message + " " + arg.stack;
            if (typeof arg === 'object') {
              try { return JSON.stringify(arg); } catch(e) { return String(arg); }
            }
            return String(arg);
          }).join(' ');

          if (shouldFilter(argStr)) {
            return;
          }
          originalConsoleError.apply(console, arguments);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
